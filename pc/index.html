<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Card Check | Rugatha</title>
  <meta name="description" content="Browse Rugatha player characters by campaign, with portraits, classes, and player information.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://rugatha.com/pc/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Rugatha">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="zh_TW">
  <meta property="og:title" content="PC Card Check | Rugatha">
  <meta property="og:description" content="Browse Rugatha player characters by campaign, with portraits, classes, and player information.">
  <meta property="og:url" content="https://rugatha.com/pc/">
  <meta property="og:image" content="https://rugatha.com/assets/rugatha-banner.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="PC Card Check | Rugatha">
  <meta name="twitter:description" content="Browse Rugatha player characters by campaign, with portraits, classes, and player information.">
  <meta name="twitter:image" content="https://rugatha.com/assets/rugatha-banner.png">
<link rel="icon" type="image/png" href="../assets/rugatha-favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/rugatha-favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../campaigns/styles/campaign-detail.css">
  <style>
    :root {
      --bg: #445f56;
      --panel: rgba(19, 28, 32, 0.72);
      --card: rgba(255, 255, 255, 0.06);
      --text: #ecf2ed;
      --muted: #cbd6cf;
      --accent-soft: rgba(123, 220, 181, 0.2);
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px 18px 40px;
      background: #445f56;
      color: var(--text);
      font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
    }

    .page {
      width: min(1200px, 100%);
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 20px;
      display: grid;
      gap: 8px;
      text-align: center;
    }

    .hero-banner {
      display: grid;
      place-items: center;
      margin-bottom: 8px;
    }

    .hero-banner img {
      width: min(380px, 90vw);
      height: auto;
      display: block;
    }

    .hero h1 {
      margin: 0;
    }

    .hero h1 {
      font-size: clamp(28px, 4vw, 40px);
    }

    .toolbar {
      margin: 0 0 18px;
      display: flex;
      justify-content: flex-start;
    }

    .language-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .language-toggle button {
      border: none;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
    }

    .language-toggle button[aria-pressed="true"] {
      background: rgba(255, 255, 255, 0.18);
      color: var(--text);
    }

    .related-pcs {
      margin-top: 0;
    }

    .campaign-section + .campaign-section {
      margin-top: 56px;
    }

    .campaign-section__title {
      margin: 0 0 14px;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f5e6b8;
      text-align: center;
    }

    .related-pcs__grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    .related-pcs__card {
      min-height: 126px;
      flex: 1 1 280px;
      min-width: 220px;
      max-width: 320px;
      color: inherit;
      text-decoration: none;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.08), transparent 28%),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 7px),
        var(--pc-card-bg, rgba(35, 43, 58, 0.96));
      border-color: var(--pc-card-border, rgba(255, 223, 163, 0.16));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 12px 26px rgba(0, 0, 0, 0.18);
    }

    .related-pcs__card::before,
    .related-pcs__card::after {
      content: none;
    }

    .related-pcs__meta {
      max-width: 100%;
      width: auto;
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      color: rgba(203, 214, 207, 0.72);
      font-size: 0.8rem;
      font-weight: 500;
      line-height: 1.12;
      backdrop-filter: none;
    }

    .related-pcs__name {
      font-size: 1.6rem;
      line-height: 1;
    }

    .related-pcs__body {
      grid-template-columns: 92px minmax(0, 1fr);
      grid-template-areas: "portrait text";
    }

    .related-pcs__text {
      grid-area: text;
      justify-content: center;
      gap: 9px;
    }

    .related-pcs__portrait {
      grid-area: portrait;
      justify-self: start;
    }

    .related-pcs__player {
      margin-top: 6px;
      font-size: 0.9rem;
      color: var(--muted);
      opacity: 0.88;
    }

    .related-pcs__player.is-guest {
      font-size: 0.82rem;
      opacity: 0.72;
    }

    .error {
      padding: 16px 18px;
      border-radius: 14px;
      background: rgba(120, 24, 24, 0.35);
      border: 1px solid rgba(255, 180, 180, 0.18);
    }
  </style>
  <!-- Rugatha PWA -->
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" content="#0f2d24">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Rugatha">
  <link rel="apple-touch-icon" href="../assets/rugatha-icon-192.png">
  <script defer src="../shared/pwa.js"></script>
</head>
<body>
  <main class="page">
    <header class="hero">
      <a class="hero-banner" href="https://rugatha.com/" aria-label="Rugatha home">
        <img src="../assets/rugatha-banner.png" alt="Rugatha banner">
      </a>
      <h1 id="page-title">玩家角色</h1>
    </header>

    <div class="toolbar">
      <div class="language-toggle" role="group" aria-label="Language">
        <button type="button" data-lang="zh" aria-pressed="true">中文</button>
        <button type="button" data-lang="en" aria-pressed="false">English</button>
      </div>
    </div>

    <section class="related-pcs" aria-live="polite">
      <h2 class="related-pcs__title">Player Characters</h2>
      <div id="pc-groups"></div>
    </section>
  </main>

  <script>
    const i18n = {
      title: {
        zh: "玩家角色",
        en: "Player Characters"
      },
      documentTitle: {
        zh: "玩家角色 | Rugatha",
        en: "Player Characters | Rugatha"
      },
      sectionTitle: {
        zh: "",
        en: ""
      },
      guestPlayer: {
        zh: "客串玩家",
        en: "Guest Player"
      }
    };

    const campaignOrder = [
      "Rugatha",
      "Rugatha Plus",
      "Rugatha lite",
      "Rugatha WILDS",
      "Rugatha Brown"
    ];

    const campaignAccents = {
      "Rugatha": "#9fe0ba",
      "Rugatha Plus": "#c8f9ff",
      "RUGATHA Plus": "#c8f9ff",
      "Rugatha lite": "#ffe7a3",
      "Rugatha WILDS": "#c1e27a",
      "Rugatha Brown": "#ffc09f",
      "Rugatha Legends": "#f6d185"
    };

    let currentLang = "zh";

    const normalizePcKey = (value) =>
      String(value || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ");

    const slugify = (value) =>
      String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)/g, "");

    const hexToRgb = (hex) => {
      const normalized = String(hex || "").replace("#", "").trim();
      if (!/^[0-9a-f]{6}$/i.test(normalized)) return null;
      const value = Number.parseInt(normalized, 16);
      return {
        r: (value >> 16) & 255,
        g: (value >> 8) & 255,
        b: value & 255
      };
    };

    const applyCampaignAccent = (card, campaign) => {
      const accent = campaignAccents[campaign] || campaignAccents.Rugatha;
      const rgb = hexToRgb(accent);
      if (!rgb) return;
      const { r, g, b } = rgb;
      card.style.setProperty("--pc-card-bg", `rgba(${Math.max(18, Math.round(r * 0.2))}, ${Math.max(22, Math.round(g * 0.2))}, ${Math.max(30, Math.round(b * 0.2))}, 0.96)`);
      card.style.setProperty("--pc-card-border", `rgba(${r}, ${g}, ${b}, 0.56)`);
    };

    const getLocalizedValue = (pc, key, fallbackKey) => {
      const primary = pc[key];
      const fallback = pc[fallbackKey];
      const value = Array.isArray(primary) && primary.length ? primary : primary || fallback;
      const normalized = Array.isArray(value) ? value : String(value || "").split("/");
      return normalized
        .map((item) => String(item || "").trim())
        .filter(Boolean)
        .join(" / ");
    };

    const getMetaValues = (pc) => {
      const race = currentLang === "en"
        ? getLocalizedValue(pc, "race_en", "race_zh")
        : getLocalizedValue(pc, "race_zh", "race_en");
      const role = currentLang === "en"
        ? getLocalizedValue(pc, "class_en", "class_zh")
        : getLocalizedValue(pc, "class_zh", "class_en");
      return { race, role };
    };

    const resolvePcImageCandidates = (name) =>
      ["jpg", "jpeg", "png"].map((ext) => `./pics/${name}.${ext}`);

    const isGuestPlayer = (pc) => String(pc.guest || "").trim() === "1";

    const getCampaigns = (pc) =>
      (Array.isArray(pc.campaign) ? pc.campaign : [pc.campaign_1, pc.campaign_2])
        .map((value) => String(value || "").trim())
        .filter((value) => value && value !== "NA" && value !== "0");

    const createCard = (pc, campaign) => {
      const card = document.createElement("a");
      card.className = "related-pcs__card";
      card.href = `./articles/${slugify(pc.name_en)}.html`;
      applyCampaignAccent(card, campaign);

      const body = document.createElement("div");
      body.className = "related-pcs__body";
      card.appendChild(body);

      const text = document.createElement("div");
      text.className = "related-pcs__text";
      body.appendChild(text);

      const name = document.createElement("div");
      name.className = "related-pcs__name";
      name.textContent = currentLang === "en"
        ? (pc.name_en || pc.name_zh || "")
        : (pc.name_zh || pc.name_en || "");
      text.appendChild(name);

      const metaValues = getMetaValues(pc);
      const metaText = [metaValues.race, metaValues.role].filter(Boolean).join(" | ");
      if (metaText) {
        const meta = document.createElement("div");
        meta.className = "related-pcs__meta";
        meta.textContent = metaText;
        text.appendChild(meta);
      }

      if (isGuestPlayer(pc)) {
        const player = document.createElement("div");
        player.className = "related-pcs__player";
        player.classList.add("is-guest");
        player.textContent = i18n.guestPlayer[currentLang];
        text.appendChild(player);
      }

      const portrait = document.createElement("div");
      portrait.className = "related-pcs__portrait";
      body.appendChild(portrait);

      const candidates = resolvePcImageCandidates(pc.name_en);
      const img = document.createElement("img");
      img.className = "related-pcs__portrait-image";
      img.alt = pc.name_en;
      img.loading = "lazy";
      img.decoding = "async";
      let index = 0;
      img.src = candidates[index];
      img.addEventListener("error", () => {
        index += 1;
        if (index < candidates.length) {
          img.src = candidates[index];
          return;
        }
        portrait.classList.add("is-empty");
        img.remove();
      });
      portrait.appendChild(img);

      return card;
    };

    const createCampaignSection = (campaign, pcs) => {
      const section = document.createElement("section");
      section.className = "campaign-section";

      const title = document.createElement("h3");
      title.className = "campaign-section__title";
      title.textContent = campaign;
      section.appendChild(title);

      const grid = document.createElement("div");
      grid.className = "related-pcs__grid";
      pcs
        .slice()
        .sort((a, b) => {
          const guestDiff = Number(isGuestPlayer(a)) - Number(isGuestPlayer(b));
          if (guestDiff !== 0) return guestDiff;
          return a.name_en.localeCompare(b.name_en);
        })
        .forEach((pc) => grid.appendChild(createCard(pc, campaign)));
      section.appendChild(grid);

      return section;
    };

    const updateLanguageUi = () => {
      document.title = i18n.documentTitle[currentLang];
      document.getElementById("page-title").textContent = i18n.title[currentLang];
      document.querySelector(".related-pcs__title").textContent = i18n.sectionTitle[currentLang];
      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.setAttribute("aria-pressed", button.dataset.lang === currentLang ? "true" : "false");
      });
    };

    const render = async () => {
      const groups = document.getElementById("pc-groups");
      groups.innerHTML = "";
      updateLanguageUi();

      try {
        const res = await fetch("./pc_lib", { cache: "no-cache" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data) || !data.length) throw new Error("pc_lib is empty");

        const pcs = data
          .filter((entry) => normalizePcKey(entry.name_en))
          .sort((a, b) => a.name_en.localeCompare(b.name_en));

        const grouped = new Map(campaignOrder.map((campaign) => [campaign, []]));
        pcs.forEach((pc) => {
          getCampaigns(pc).forEach((campaign) => {
            if (!grouped.has(campaign)) grouped.set(campaign, []);
            grouped.get(campaign).push(pc);
          });
        });

        campaignOrder.forEach((campaign) => {
          const list = grouped.get(campaign) || [];
          if (!list.length) return;
          groups.appendChild(createCampaignSection(campaign, list));
        });

      } catch (error) {
        const message = document.createElement("div");
        message.className = "error";
        message.textContent = error && error.message ? error.message : String(error);
        groups.replaceWith(message);
      }
    };

    document.querySelectorAll("[data-lang]").forEach((button) => {
      button.addEventListener("click", () => {
        currentLang = button.dataset.lang === "en" ? "en" : "zh";
        render();
      });
    });

    render();
  </script>
</body>
</html>
